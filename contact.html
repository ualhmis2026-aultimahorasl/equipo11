<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contacto | Última Hora SL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{

background:#1e293b;
padding:40px;
border-radius:15px;
width:400px;

box-shadow:0 20px 40px rgba(0,0,0,0.6);

animation:fadeIn 1s ease;

}

h1{
text-align:center;
margin-bottom:25px;
}

input, textarea{

width:100%;
padding:12px;

margin-bottom:15px;

border:none;
border-radius:6px;

background:#0f172a;
color:white;

}

textarea{
resize:none;
}

button{

width:100%;
padding:12px;

background:#38bdf8;
border:none;

border-radius:6px;

font-weight:bold;

cursor:pointer;

}

button:hover{
background:#0ea5e9;
}

.back{

display:block;
text-align:center;

margin-top:20px;

color:#38bdf8;
text-decoration:none;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<h1>Contacto</h1>

<form>

<input type="text" placeholder="Nombre" required>

<input type="email" placeholder="Correo electrónico" required>

<input type="text" placeholder="Asunto">

<textarea rows="5" placeholder="Mensaje"></textarea>

<button type="submit">
Enviar mensaje
</button>

</form>

<a class="back" href="index.html">
← Volver al blog
</a>

</div>

</body>

</html>
